<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; URL='/'" />
  <title>Redirecting – Sara Foundation</title>
  <script>
    sessionStorage.setItem('redirect', window.location.pathname + window.location.search);
    window.location.replace('/');
  </script>
</head>
<body>
  <noscript>
    <p>If you are not redirected automatically, <a href="/">click here to go to the homepage</a>.</p>
  </noscript>
</body>
</html>
